# Glassbox scoring rule config for the Endex account. Generalizes InRule's
# glassbox_rules.yaml 7-condition schema — see glassbox_scorer.py for the
# engine that reads this file (company-agnostic; this file is what makes it
# Endex-specific). run_glassbox.py --campaign-id <id> picks this up
# automatically via the "<Company> ICP" campaign-name → slug convention.
#
# evidence_source values (consumed by run_glassbox.py's build_evidence()):
#   sec_or_signals       — try SEC EDGAR full-text search first, fall back to
#                           already-collected oracle_signals evidence text
#   signals               — oracle_signals evidence text only (already flowing
#                           in via the Endex ICP campaign's job/news sources)
#   sec_or_firmographic   — SEC SIC code, else companies.industry field match
#   always                — no external evidence source needed, always evaluable
#
# category_terms / competitor_products / target_industries referenced below
# are read from icp_profiles/endex.yaml at run time — not duplicated here.

meta:
  company: Endex
  version: "1.0"
  note: >
    Unlike QuadSci's majority-private reference set, a large share of Endex's
    ICP (investment banks, publicly traded REITs, Fortune 500 corporate
    finance teams) DOES file with the SEC — 10-Ks/10-Qs/8-Ks routinely
    disclose new CFOs, technology/AI initiatives, and headcount actions.
    SEC EDGAR full-text search (sec_filing_signal.py, free, no key) is
    therefore a first-class evidence source here, not just a fallback for
    the private-fund portion of the ICP that fails back to signals evidence.

rules:
  - id: R1
    name: Category buying-language in evidence
    condition: category_language
    weight: 10
    evidence_source: sec_or_signals
    rationale_template: "Uses category language (\"{term}\") — actively describing the capability Endex provides."

  - id: R2
    name: Competitor product named (displacement window)
    condition: displacement
    weight: 12
    evidence_source: sec_or_signals
    rationale_template: "Names a competitor product (\"{term}\") — category budget already exists; a displacement opportunity, not a cold category-education sale."

  - id: R3
    name: Technographic/industry fit
    condition: industry_fit
    weight: 6
    evidence_source: sec_or_firmographic
    rationale_template: "Industry/technographic match: {term} — a core Endex target archetype (IB / PE / HF / corporate FP&A)."

  - id: R4
    name: Recent funding or fund-close trigger
    condition: recent_trigger_event
    weight: 8
    decay_days: 365
    evidence_source: sec_or_signals
    rationale_template: "Recent trigger event (\"{term}\") — fresh AUM or a new fund is the exact moment modeling-automation tooling gets budget."

  - id: R5
    name: Leadership change
    condition: leadership_change
    weight: 10
    decay_days: 365
    evidence_source: sec_or_signals
    rationale_template: "Leadership change signal (\"{term}\") — new CFOs/Heads of FP&A typically audit and refresh the finance tech stack within 90 days."

  - id: R6
    name: Live buying-window timing
    condition: buying_window_timing
    weight: 8
    evidence_source: always
    rationale_template: "{n} trigger events in the last 270 days (most recent {days} days ago) — signals cluster in time, an active buying motion."

  - id: R7
    name: Decision-maker identified
    condition: decision_maker_found
    weight: 4
    evidence_source: always
    rationale_template: "A persona-matched decision-maker was found via Apollo ({contact}) — the account is actionable today."
