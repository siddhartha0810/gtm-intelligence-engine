# Buying-signal taxonomy for the QuadSci ICP (customer-intelligence AI for B2B SaaS).
# Confidence scale mirrors .claude/rules/signals.md's Oracle convention:
#   0.75-0.90 explicit/high-confidence, 0.60-0.75 strong indicator,
#   0.50-0.60 weak/context-dependent. Below 0.40 not worth storing.
#
# This file is the single source of truth for both the QuadSci page's
# "signal rules & classification" display and the seed campaign's keyword
# config (seed_quadsci_campaign.py) — do not duplicate these lists elsewhere.

signal_rules:
- type: hiring
  description: Actively recruiting for RevOps/CS/retention-owning roles — direct
    proof of budget and organizational ownership forming around churn/retention.
  detect:
  - Head of RevOps
  - VP RevOps
  - VP Customer Success
  - Director of Retention
  - Churn Analyst
  - Revenue Operations Manager
  - Customer Success Operations Manager
  - Head of Customer Success
  - Director of Customer Success
  - VP Customer Experience
  - Chief Customer Officer
  - Director of RevOps
  - Retention Marketing Manager
  - Customer Success Analyst
  - VP GTM Operations
  - Head of GTM
  confidence: 0.75

- type: tech_stack_tell
  description: Job description lists existing CS/analytics tooling as a requirement —
    confirms the technographic fit (they already have telemetry infrastructure).
  detect:
  - Gainsight
  - Pendo
  - Mixpanel
  - Amplitude
  - Clari
  - Vitally
  - Catalyst Software
  - Totango
  - ChurnZero
  - Planhat
  - Custify
  - Baremetrics
  - ProfitWell
  - Heap Analytics
  context: job_description
  confidence: 0.60

- type: funding_event
  description: Fresh capital raise, especially press citing efficient growth or NRR —
    urgency signal for retention tooling investment.
  detect:
  - Series A
  - Series B
  - Series C
  - Series D
  - Series E
  - Series F
  - seed round
  - seed funding
  - raises $
  - funding round
  - closes funding
  - secures funding
  - net revenue retention
  - efficient growth
  confidence: 0.70

- type: leadership_change
  description: New CRO/CCO/RevOps hire — new execs typically audit and refresh the
    GTM tech stack within their first 90 days.
  detect:
  - new CRO
  - new Chief Customer Officer
  - joins as Head of RevOps
  - appoints VP of Customer Success
  confidence: 0.65

- type: nrr_commentary
  description: Public commentary (earnings calls, investor updates, exec posts)
    flagging NRR softness or churn concerns — direct evidence of pain, highest-intent
    signal available.
  detect:
  - NRR softness
  - churn concerns
  - retention challenges
  - net revenue retention decline
  confidence: 0.80

- type: customer_pain_language
  description: A prospect's OWN CUSTOMERS, in public G2/Capterra reviews, describing
    the exact symptom QuadSci cures — reactive support, no usage visibility, surprise
    renewals/charges. Third-party disclosure in the customer's own words, not the
    prospect's marketing — the sharpest available evidence for a private company
    with no SEC filings to mine (the closest QuadSci equivalent to what SEC filings
    were for InRule's regulated-industry ICP). Sourced via g2_review_search.py
    (free DuckDuckGo web search, not the Bing-News-only g2_reviews_signal.py, which
    never surfaces review pages at all). Multi-word phrases only — a bare word here
    risks the same false-positive class as "Pendo"/"Clari" did as single tokens.
  detect:
  - poor customer support
  - slow customer support
  - reactive support
  - unresponsive support
  - no visibility into
  - lack of visibility
  - didn't know until
  - surprised by the renewal
  - unexplained charges
  - difficult to reach support
  - customer success is reactive
  - found out too late
  - billing practices feel unfair
  - migrating away
  - switching away from
  - users migrating away
  - complaints regarding support
  - not communicating
  confidence: 0.65

- type: competitor_displacement
  description: Evidence of active evaluation or migration away from existing CS/analytics
    tooling — timing signal for an in-flight buying process.
  detect:
  - migrating from Gainsight
  - switching from Pendo
  - QBR prep
  - manual churn analysis
  confidence: 0.55
