meta:
  company: InRule Technology
  domain: inrule.com
  status: production — verified via inrule.com, G2, Gartner Peer Insights, SEC EDGAR,
    LinkedIn, USASpending.gov, OCC enforcement database
  product: irAuthor / irVerify / irAI — business rules management system (BRMS)
    and decision automation platform. Enables non-technical business users to author,
    test, and deploy decision logic (eligibility, underwriting, claims adjudication,
    compliance rules) without writing code.
  gtm_motion: >
    Enterprise direct sales + SI/consulting partner channel. Deals are typically
    $50K-$500K+ ARR. Sales cycle 3-9 months. Key motion is displacing legacy BRMS
    (FICO Blaze Advisor, IBM ODM/ILOG, Progress Corticon) or replacing hard-coded
    rules in custom-built policy engines. Compliance-driven buying events (OCC
    enforcement, CMS audit findings) create non-discretionary procurement windows.

