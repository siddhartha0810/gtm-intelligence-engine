identification_criteria:
  firmographic:
    - Insurance carriers (life, P&C, health) — $100M+ GWP or 200+ employees
    - Commercial banks and credit unions — $500M+ in assets
    - Healthcare payers (managed care, Medicare Advantage plans)
    - Federal and state government agencies with eligibility/benefits programs
    - Mortgage originators and servicers with automated underwriting workflows
    - Fintech companies with rules-heavy decisioning (credit, fraud, lending)
  technographic:
    # Competitor installs — displacement opportunity
    - FICO Blaze Advisor
    - IBM ODM / ILOG JRules
    - Progress Corticon
    - Drools / Red Hat Decision Manager
    # Adjacent tech that indicates rules complexity
    - Guidewire (insurance core — often paired with a BRMS)
    - Duck Creek (insurance core)
    - Majesco (insurance core)
    - Epic / Cerner (healthcare — prior auth rules)
    - nCino (banking — loan origination rules)
    - Salesforce Financial Services Cloud
  compliance_triggers:
    - OCC Consent Order or Formal Agreement (banking)
    - CMS audit finding requiring prior auth automation
    - State insurance department market conduct exam
    - SOX / model risk management remediation
    - CFPB enforcement action (lending decisioning)

excluded_segments:
  - Pure staffing and SI firms (Accenture, Deloitte, IBM, Infosys, etc.)
  - Software vendors that compete with InRule (Pega, Appian, Camunda)
  - Companies with fewer than 100 employees (below enterprise deal threshold)
  - Retail, manufacturing, or logistics companies with no rules-heavy decisioning
  - Early-stage startups without a production rules environment

