meta:
  company: QuadSci
  domain: quadsci.ai
  status: aligned to QuadSci's own ICP statement (GTM Engineer exercise brief) + quadsci.ai
    site language; earlier bands ($20M-$500M ARR, Series C+) were news-derived and
    are superseded by the company's stated ICP
category_terms:
- Customer Intelligence AI
- Growth AI
- Cohorts AI
- Churn Prediction
- Product Telemetry Analytics
- Revenue Orchestration
target_industries:
- Infrastructure / DevTools SaaS
- Data / MDM / Integration Platforms
- Security SaaS
- MarTech
- RevOps Tooling
current_clients:
- Clari
- Reltio
- Movable Ink
- Boomi
- Tenable
buyer_personas:
  primary:
  - Chief Revenue Officer (CRO)
  - SVP / VP Sales
  - VP / Head of RevOps
  - Director of Revenue Operations
  secondary:
  - Chief Customer Officer (CCO) / VP Customer Success
  - CS Operations lead
  internal_ally:
  - Chief Product Officer (CPO) / Head of Product
  - Chief Marketing Officer (CMO)
identification_criteria:
  firmographic:
  - B2B SaaS (subscription software product)
  - 200+ employees (sweet spot 200-500)
  - Series B or later
  - Ideally $50M+ ARR
  - Existing CS AND Sales teams (a real renewal motion to improve)
  technographic:
  - Gainsight
  - Pendo
  - Mixpanel
  - Amplitude
  - ContentSquare
  - Clari
  - Salesforce
excluded_segments:
- Non-B2B-SaaS (no subscription software product)
- Under 200 employees
- Pre-Series B
- No CS function (no renewal motion, no buyer)
- Services / consulting / staffing businesses
- QuadSci partners and existing customers
hard_filters:
  non_saas_industry_markers:
  - automotive
  - aerospace
  - aviation
  - airline
  - drone
  - mobility
  - energy
  - manufacturing
  - hardware
  - defense
  - biotech
  - pharmaceutical
  - retail
  - hospitality
  disqualify_companies:
    Rivian: EV manufacturer — not B2B SaaS
    Surf Air Mobility: regional aviation — not B2B SaaS
    Skydio: drone hardware maker — not B2B SaaS (its own customers, not a prospect)
    ClarityQ: seed-stage, well under 200 employees — below the ICP floor
    Botrista: beverage-robotics hardware — not B2B SaaS
    ElectronX: electricity-derivatives exchange — not B2B SaaS
    BackOps AI: seed-stage logistics automation — below the ICP floor
    Patreon: B2C creator platform (B2C2B) — outside the B2B-SaaS core, kept only as
      a flagged edge case
    Interface: carpet/flooring manufacturer (NYSE TILE, SIC 2273) — not B2B SaaS
    Bi Pendo: name-extraction artifact, not a real company
    Lumion: seed-stage / ambiguous identity — below the ICP floor
    Whatnot: B2C livestream marketplace — not B2B SaaS
competitor_products:
- Gainsight
- ChurnZero
- Clari
- Hook
- Reef
- Magnify
_product_language:
  products:
    Growth AI: predictive revenue intelligence — forecasts customer growth, contraction,
      and churn (CRO / VP Sales / CS leaders)
    Cohorts AI: intelligent behavioral segmentation tying product adoption to ARR
      (CPO / CMO)
  claims:
  - 90%+ growth and churn accuracy
  - predictions 9-18 months in advance of renewal
  - 15% average ARR growth across churn prevention and expansion
  - 11 trillion telemetry events processed
  phrases:
  - See risk early. Act while there's still time.
  - Customer Intelligence AI for GTM Teams
  - grounded in real user behavior
  - product-usage intelligence versus CRM-derived guesswork
  differentiator: ingests raw product telemetry, not CRM/CS-platform data scored with
    human-built rules
_evidence:
  sources:
  - https://quadsci.ai/
  - QuadSci GTM Engineer Candidate Exercise brief (ICP + competitor set, verbatim)
  - https://www.businesswire.com/news/home/20260217365560/en/QuadSci-the-Most-Predictive-and-Prescriptive-AI-For-Customer-Intelligence-Raises-$8m-Series-A
  founders: Dan Harmeson and Sean Murray (both ex-Elastic, ex-MuleSoft)
  funding: $10.1M total raised, $8M Series A (Feb 2026) led by Crosslink Capital
